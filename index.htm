<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Valentine 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0; padding: 0;
}
:root {
    --red: #d42e5a;
    --rose: #ff6b9d;
    --blush: #ffd6e7;
    --cream: #fff5f8;
    --gold: #f0c060;
    --dark: #1a0510;
}
body {
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    background: var(--dark);
    cursor: none;
}
.cursor {
    position: fixed;
    width: 20px; height: 20px;
    background: var(--rose);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, width 0.2s, height 0.2s;
    mix-blend-mode: screen;
}
.cursor-trail {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: all 0.3s ease;
    opacity: 0.6;
}
#canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
}
.page {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    transition: opacity 0.8s ease, transform 0.8s ease;
}
.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.95);
}

/* PAGE 1 */
#page1 {
    background: radial-gradient(ellipse at 30% 40%, #5c0a2a 0%, #1a0510 50%, #0d000a 100%);
}
.p1-glow {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,46,90,0.3) 0%, transparent 70%);
    animation: pulse 3s ease-in-out infinite alternate;
    pointer-events: none;
}
@keyframes pulse {
    from { transform: scale(0.9); opacity: 0.6; }
    to { transform: scale(1.1); opacity: 1; }
}
.big-heart {
    font-size: 120px;
    line-height: 1;
    animation: heartbeat 1.5s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(212,46,90,0.9)) drop-shadow(0 0 60px rgba(212,46,90,0.5));
    position: relative;
    z-index: 2;
}
@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.12); }
    28% { transform: scale(1); }
    42% { transform: scale(1.08); }
    70% { transform: scale(1); }
}
.p1-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-style: italic;
    color: var(--cream);
    letter-spacing: 0.05em;
    position: relative;
    z-index: 2;
    margin-top: 20px;
    text-shadow: 0 0 40px rgba(255,107,157,0.8), 0 4px 20px rgba(0,0,0,0.5);
}
.p1-subtitle {
    font-size: 1.1rem;
    color: var(--rose);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 8px;
    position: relative;
    z-index: 2;
    font-weight: 300;
    animation: shimmer 2s ease-in-out infinite alternate;
}
@keyframes shimmer {
    from { opacity: 0.6; letter-spacing: 0.3em; }
    to { opacity: 1; letter-spacing: 0.4em; }
}
.p1-date {
    margin-top: 14px;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    position: relative;
    z-index: 2;
}
.divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto;
    position: relative;
    z-index: 2;
}

/* BUTTONS */
.btn {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 36px;
    border: 1px solid rgba(240,192,96,0.5);
    background: transparent;
    color: var(--gold);
    cursor: none;
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
    margin: 6px;
    backdrop-filter: blur(4px);
}
.btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(212,46,90,0.2), rgba(240,192,96,0.1));
    transform: translateX(-100%);
    transition: transform 0.4s ease;
}
.btn:hover::before { transform: translateX(0); }
.btn:hover {
    color: white;
    border-color: var(--rose);
    box-shadow: 0 0 20px rgba(212,46,90,0.4), inset 0 0 20px rgba(212,46,90,0.1);
    transform: translateY(-2px);
}
.btn:active { transform: translateY(0); }
.next-btn { margin-top: 40px; position: relative; z-index: 2; }

/* PAGE 2 */
#page2 {
    background: radial-gradient(ellipse at 60% 30%, #3d0a20 0%, #1a0510 60%, #0d000a 100%);
}
.p2-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-style: italic;
    color: var(--cream);
    text-align: center;
    text-shadow: 0 0 30px rgba(255,107,157,0.6);
    position: relative;
    z-index: 2;
}
.p2-sub {
    font-size: 0.9rem;
    color: rgba(255,214,231,0.6);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 40px;
    position: relative;
    z-index: 2;
}
.name-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    max-width: 420px;
    position: relative;
    z-index: 2;
}
.name-btn {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-style: italic;
    letter-spacing: 0.1em;
    padding: 16px 32px;
    border: 1px solid rgba(255,107,157,0.4);
    background: rgba(255,107,157,0.05);
    color: var(--blush);
    cursor: none;
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
    backdrop-filter: blur(6px);
}
.name-btn::after {
    content: '♥';
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%) scale(0);
    transition: transform 0.3s ease;
    color: var(--rose);
    font-size: 0.8rem;
}
.name-btn:hover::after { transform: translateY(-50%) scale(1); }
.name-btn:hover {
    background: rgba(212,46,90,0.2);
    border-color: var(--rose);
    color: white;
    box-shadow: 0 0 25px rgba(212,46,90,0.3);
    transform: translateY(-3px);
    padding-right: 40px;
}

/* PAGE 3 */
#page3 {
    background: radial-gradient(ellipse at 50% 60%, #4a0825 0%, #1a0510 55%, #0d000a 100%);
}
.msg-box {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 600px;
    padding: 20px;
}
.to-label {
    font-size: 0.8rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.8;
    display: block;
    margin-bottom: 6px;
}
.recipient-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 7vw, 5.5rem);
    font-style: italic;
    color: white;
    text-shadow: 0 0 50px rgba(255,107,157,0.9), 0 0 100px rgba(212,46,90,0.4);
    line-height: 1;
    animation: nameGlow 2s ease-in-out infinite alternate;
}
@keyframes nameGlow {
    from { text-shadow: 0 0 40px rgba(255,107,157,0.7), 0 0 80px rgba(212,46,90,0.3); }
    to { text-shadow: 0 0 60px rgba(255,107,157,1), 0 0 120px rgba(212,46,90,0.6); }
}
.msg-text {
    font-size: clamp(1rem, 2.2vw, 1.4rem);
    color: rgba(255,214,231,0.85);
    line-height: 1.9;
    font-weight: 300;
    font-style: italic;
    margin-top: 24px;
    animation: fadeInUp 1s ease both;
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
.couple-icon {
    display: block;
    margin: 16px auto;
    animation: coupleFloat 3s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 20px rgba(255,107,157,0.8));
}
@keyframes coupleFloat {
    from { transform: translateY(0) scale(1); }
    to { transform: translateY(-12px) scale(1.05); }
}
.seal {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(240,192,96,0.5);
    margin-top: 30px;
    display: block;
}
.from-wrapper {
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    animation: fadeInUp 1.4s ease both;
}
.from-text {
    font-size: 0.85rem;
    color: rgba(255,214,231,0.45);
    letter-spacing: 0.3em;
    font-style: italic;
}
.from-name {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    background: linear-gradient(135deg, #ffb3cc, #f0c060, #ff6b9d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(255,107,157,0.6));
    animation: nameFloat 3s ease-in-out infinite alternate;
    letter-spacing: 0.08em;
}
@keyframes nameFloat {
    from { filter: drop-shadow(0 0 10px rgba(255,107,157,0.5)); transform: translateY(0); }
    to   { filter: drop-shadow(0 0 22px rgba(255,107,157,0.9)); transform: translateY(-4px); }
}
.from-emoji {
    font-size: 1.1rem;
    animation: emojiSpin 4s ease-in-out infinite;
    display: inline-block;
    letter-spacing: 0.15em;
}
@keyframes emojiSpin {
    0%, 100% { transform: scale(1) rotate(-3deg); }
    50% { transform: scale(1.15) rotate(3deg); }
}

/* NAV ARROWS */
.nav-arrows {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
    z-index: 100;
    align-items: center;
}
.arrow-btn {
    width: 54px; height: 54px;
    border-radius: 50%;
    border: 1px solid rgba(240,192,96,0.45);
    background: rgba(10,0,8,0.5);
    color: var(--gold);
    font-size: 1.3rem;
    display: flex; align-items: center; justify-content: center;
    cursor: none;
    position: relative;
    overflow: hidden;
    transition: all 0.35s ease, opacity 0.4s ease;
    backdrop-filter: blur(8px);
}
.arrow-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle, rgba(212,46,90,0.35), transparent 70%);
    transform: scale(0);
    transition: transform 0.35s ease;
    border-radius: 50%;
}
.arrow-btn:hover::before { transform: scale(1); }
.arrow-btn:hover {
    border-color: var(--rose);
    color: white;
    box-shadow: 0 0 22px rgba(212,46,90,0.55), inset 0 0 14px rgba(212,46,90,0.15);
    transform: scale(1.1);
}
.arrow-btn:active { transform: scale(0.96); }
.arrow-btn svg {
    width: 20px; height: 20px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    position: relative; z-index: 1;
}
.dot-indicator { display: flex; gap: 8px; align-items: center; }
.dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(240,192,96,0.25);
    transition: all 0.4s ease;
}
.dot.active {
    background: var(--gold);
    width: 20px;
    border-radius: 3px;
    box-shadow: 0 0 8px rgba(240,192,96,0.7);
}

/* FLOATERS */
.floater {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    animation: floatUp linear infinite;
    opacity: 0;
}
@keyframes floatUp {
    0% { transform: translateY(110vh) rotate(0deg) scale(0.5); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(1.1); opacity: 0; }
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-trail" id="cursorTrail"></div>
<canvas id="canvas"></canvas>

<!-- NAV ARROWS -->
<div class="nav-arrows" id="navArrows">
    <button class="arrow-btn" id="backBtn" onclick="navBack()" title="Back">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="dot-indicator">
        <div class="dot active" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
    </div>
    <button class="arrow-btn" id="nextIconBtn" onclick="navNext()" title="Next">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
</div>

<!-- PAGE 1 -->
<div id="page1" class="page">
    <div class="p1-glow"></div>
    <div class="big-heart">💗</div>
    <div class="divider"></div>
    <h1 class="p1-title">Happy Valentine's Day</h1>
    <p class="p1-subtitle">With Sincere Love </p>
    <p class="p1-date">February 14 · 2026</p>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page hidden">
    <h2 class="p2-title">A Message for you </h2>
    <div class="divider"></div>
    <p class="p2-sub">Pilih Namamu bebku</p>
    <div class="name-grid">
        <button class="name-btn" onclick="openMessage('Shindy')">Shindy</button>
        <button class="name-btn" onclick="openMessage('Yohana')">Yohana</button>
        <button class="name-btn" onclick="openMessage('Devi')">Devi</button>
        <button class="name-btn" onclick="openMessage('Nadine')">Nadine</button>
        <button class="name-btn" onclick="openMessage('Ginta')">Ginta</button>
    </div>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page hidden">
    <div class="msg-box">
        <span class="to-label">A Valentine's Wish for my lope</span>
        <h1 class="recipient-name" id="nama"></h1>
        <div class="divider"></div>
        <div class="couple-icon">
            <svg viewBox="0 0 160 110" width="200" height="130" xmlns="http://www.w3.org/2000/svg">
                <!-- GIRL LEFT (pink) -->
                <ellipse cx="47" cy="28" rx="18" ry="20" fill="#c0506a"/>
                <circle cx="47" cy="30" r="14" fill="#f9d6c0"/>
                <path d="M33 24 Q37 14 47 15 Q57 14 61 24 Q55 18 47 19 Q39 18 33 24Z" fill="#c0506a"/>
                <path d="M33 24 Q28 32 30 42 Q34 37 34 30Z" fill="#c0506a"/>
                <path d="M61 24 Q66 32 64 42 Q60 37 60 30Z" fill="#c0506a"/>
                <ellipse cx="42" cy="30" rx="2.5" ry="3" fill="#5a2d3a"/>
                <ellipse cx="52" cy="30" rx="2.5" ry="3" fill="#5a2d3a"/>
                <circle cx="43" cy="29" r="0.9" fill="white"/>
                <circle cx="53" cy="29" r="0.9" fill="white"/>
                <ellipse cx="39" cy="35" rx="4" ry="2.5" fill="rgba(255,130,160,0.4)"/>
                <ellipse cx="55" cy="35" rx="4" ry="2.5" fill="rgba(255,130,160,0.4)"/>
                <path d="M43 37 Q47 41 51 37" stroke="#c0506a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                <rect x="44" y="43" width="6" height="7" rx="3" fill="#f9d6c0"/>
                <path d="M30 50 Q34 46 47 46 Q60 46 64 50 L68 95 Q47 100 26 95Z" fill="#ff6b9d"/>

                <path d="M47 14 Q44 10 40 12 Q44 15 47 14Z" fill="#ffb3cc"/>

                <ellipse cx="113" cy="28" rx="18" ry="20" fill="#7a3b8c"/>

                <circle cx="119" cy="29" r="0.9" fill="white"/>

                <path d="M130 54 Q142 65 140 76" stroke="#fde0d0" stroke-width="7" stroke-linecap="round" fill="none"/>

                <!-- Joined hands & heart -->

            </svg>
        </div>
        <p class="msg-text" id="pesan"></p>
        <span class="seal">✦ With All My Heart ✦</span>
        <div class="from-wrapper">
            <span class="from-text">— from</span>
            <span class="from-name">Elisabeth</span>
            <span class="from-emoji">🌸✨💖</span>
        </div>
    </div>
</div>

<script>
const cursor = document.getElementById('cursor');
const trail = document.getElementById('cursorTrail');
let tx = 0, ty = 0, ttx = 0, tty = 0;
document.addEventListener('mousemove', e => {
    tx = e.clientX; ty = e.clientY;
    cursor.style.left = tx + 'px';
    cursor.style.top = ty + 'px';
});
function animTrail() {
    ttx += (tx - ttx) * 0.15;
    tty += (ty - tty) * 0.15;
    trail.style.left = ttx + 'px';
    trail.style.top = tty + 'px';
    requestAnimationFrame(animTrail);
}
animTrail();

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

const particles = [];
for (let i = 0; i < 60; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 0.5,
        dx: (Math.random() - 0.5) * 0.3,
        dy: -Math.random() * 0.5 - 0.1,
        opacity: Math.random() * 0.5 + 0.1
    });
}
function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(240,192,96,${p.opacity})`;
        ctx.fill();
        p.x += p.dx; p.y += p.dy;
        if (p.y < -5) { p.y = canvas.height + 5; p.x = Math.random() * canvas.width; }
    });
    requestAnimationFrame(drawParticles);
}
drawParticles();

const floatSymbols = ['💖', '🌹', '✨', '💌', '🌸', '💕', '✦', '♡'];
function createFloater() {
    const el = document.createElement('div');
    el.classList.add('floater');
    el.textContent = floatSymbols[Math.floor(Math.random() * floatSymbols.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (12 + Math.random() * 22) + 'px';
    const dur = 6 + Math.random() * 7;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = Math.random() * 2 + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + 2) * 1000);
}
setInterval(createFloater, 700);

let currentPage = 1;
const totalPages = 3;

function updateNav() {
    const backBtn = document.getElementById('backBtn');
    const nextIconBtn = document.getElementById('nextIconBtn');
    for (let i = 1; i <= totalPages; i++) {
        document.getElementById('dot' + i).classList.toggle('active', i === currentPage);
    }
    backBtn.style.opacity = currentPage === 1 ? '0' : '1';
    backBtn.style.pointerEvents = currentPage === 1 ? 'none' : 'auto';
    nextIconBtn.style.opacity = (currentPage === 3 || currentPage === 2) ? '0' : '1';
    nextIconBtn.style.pointerEvents = (currentPage === 3 || currentPage === 2) ? 'none' : 'auto';
}

function goTo(n) {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById('page' + n).classList.remove('hidden');
    currentPage = n;
    updateNav();
}

function navNext() { if (currentPage < totalPages) goTo(currentPage + 1); }
function navBack() { if (currentPage > 1) goTo(currentPage - 1); }
